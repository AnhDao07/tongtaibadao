function openPopup(type){
document.getElementById("popup").style.display = "flex";

let title = "";
if(type === "dan") title = "Phe Dân";
if(type === "soi") title = "Phe Sói";
if(type === "phe3") title = "Phe Thứ 3";

document.getElementById("popup-title").innerText = title;

let list = document.getElementById("char-list");
let info = document.getElementById("char-info");

list.innerHTML = "";
info.innerHTML = "<h3>Chọn nhân vật</h3><p>Ấn vào bên trái để xem thông tin</p>";

data[type].forEach(char=>{
let li = document.createElement("li");
li.innerText = char.name;

li.onclick = ()=>{
document.querySelectorAll(".char-list li").forEach(e=>e.classList.remove("active"));
li.classList.add("active");

info.innerHTML = `
<h3>${char.name}</h3>
<p>${char.info}</p>
`;

// mobile auto scroll
if(window.innerWidth <= 768){
info.scrollIntoView({behavior:"smooth"});
}
};

list.appendChild(li);
});
}

function closePopup(){
document.getElementById("popup").style.display = "none";
}
