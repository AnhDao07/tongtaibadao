<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:"Segoe UI", sans-serif;
background:#fafafa;
color:#111;
overflow-x:hidden;
}

/* NAV */
.navbar{
background:#000;
padding:12px;
text-align:center;
}

.navbar a{
color:#fff;
margin:0 10px;
text-decoration:none;
font-size:14px;
}

/* CONTAINER */
.container{
max-width:800px;
margin:auto;
padding:30px 15px;
}

h1{
text-align:center;
margin-bottom:25px;
}

/* CARD */
.artifact{
background:#fff;
border-radius:18px;
padding:18px;
margin-bottom:18px;
cursor:pointer;
position:relative;
transition:0.25s;
border:1px solid #eee;
overflow:hidden;
}

/* màu */
.orange{
border-left:5px solid #ff914d;
background:linear-gradient(135deg, rgba(255,145,77,0.15), rgba(255,255,255,0.9));
}

.green{
border-left:5px solid #2ecc71;
background:linear-gradient(135deg, rgba(46,204,113,0.15), rgba(255,255,255,0.9));
}

/* badge */
.badge{
font-size:11px;
padding:3px 7px;
border-radius:8px;
background:#000;
color:#fff;
display:inline-block;
margin-bottom:6px;
}

/* title */
.artifact h3{
display:flex;
align-items:center;
gap:8px;
transition:0.3s;
}

/* dot */
.dot{
width:10px;
height:10px;
border-radius:50%;
}

.orange .dot{background:#ff914d;}
.green .dot{background:#2ecc71;}

/* line chạy */
.artifact::after{
content:"";
position:absolute;
bottom:0;
left:0;
height:2px;
width:0%;
background:linear-gradient(to right,#ff914d,#2ecc71);
transition:0.4s;
}

.artifact.active::after{
width:100%;
}

/* detail */
.detail{
max-height:0;
opacity:0;
transform:translateY(-6px);
overflow:hidden;
transition:all 0.35s cubic-bezier(.2,.8,.2,1);
font-size:14px;
color:#444;
}

.artifact.active .detail{
max-height:200px;
opacity:1;
transform:translateY(0);
margin-top:10px;
}

/* CAPOO */
.fly{
position:fixed;
left:-120px;
pointer-events:none;
}

@keyframes fly{
0%{transform:translateX(0);}
100%{transform:translateX(120vw);}
}

@keyframes flyReverse{
0%{transform:translateX(0) scaleX(-1);}
100%{transform:translateX(-120vw) scaleX(-1);}
}

@media(max-width:600px){
.fly{width:60px;}
}
</style>

const list = document.getElementById("list");

artifacts.forEach(a=>{
let div = document.createElement("div");
div.className = "artifact " + a.color;

div.innerHTML = `
<div class="badge">${a.color==="orange"?"1 lần":"∞"}</div>
<h3><span class="dot"></span>${a.name}</h3>
<div class="detail">${a.info}</div>
`;

div.onclick = ()=>{
div.classList.toggle("active");
};

list.appendChild(div);
});

/* 🎲 CAPOO RANDOM KHÔNG DÍNH */
const usedPositions = [];
const minGap = 15;

function getSafeTop(){
let tries = 0;

while(tries < 50){
let top = Math.random()*80;
let ok = usedPositions.every(pos => Math.abs(pos - top) > minGap);

if(ok){
usedPositions.push(top);
return top;
}
tries++;
}
return Math.random()*80;
}

function createFly(src){
let img = document.createElement("img");
img.src = src;
img.className = "fly";

let size = 50 + Math.random()*50;
img.style.width = size + "px";

// vị trí an toàn
img.style.top = getSafeTop() + "%";

// tốc độ
let duration = 6 + Math.random()*3;

// delay
img.style.animationDelay = Math.random()*9 + "s";

if(Math.random() > 0.5){
img.style.right = "-200px";
img.style.left = "auto";
img.style.animation = `flyReverse ${duration}s linear infinite`;
img.style.transform = "scaleX(-1)";
}else{
img.style.animation = `fly ${duration}s linear infinite`;
}

document.body.appendChild(img);
}
